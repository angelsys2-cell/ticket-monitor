name: 인터파크 취소표 모니터

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v6

      - name: Python 설치
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: 의존성 설치
        run: pip install requests

      - name: 취소표 모니터링 실행
        env:
          BOT_TOKEN:  ${{ secrets.BOT_TOKEN }}
          CHAT_ID:    ${{ secrets.CHAT_ID }}
          GOODS_CODE: "26004520"
        run: python monitor.py
